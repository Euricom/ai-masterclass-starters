<div class="container mx-auto p-8">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Animals</h1>

  @if (loading()) {
  <p class="text-gray-500">Loading...</p>
  } @else {
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Name
        </th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Species
        </th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Age
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      @for (animal of animals(); track animal.id) {
      <tr>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ animal.name }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ animal.species }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ animal.age }}</td>
      </tr>
      }
    </tbody>
  </table>
  }
</div>
